<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BasketCount Közgáz Team RSVP</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #1e293b;
            --card: #0f172a;
            --orange: #f97316;
            --green: #22c55e;
            --red: #ef4444;
            --text: #f8fafc;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }
        .card {
            background-color: var(--card);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-sizing: border-box;
        }
        h1 { color: var(--orange); margin-top: 0; font-size: 28px; }
        h2 { font-size: 18px; margin-bottom: 25px; color: #cbd5e1; }
        .event-details {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: left;
            border-left: 4px solid var(--orange);
        }
        .detail-item { margin: 8px 0; font-size: 14px; color: #cbd5e1; }
        .maps-btn { 
            display: inline-block; 
            margin-top: 10px; 
            color: #38bdf8; 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: bold;
        }
        .maps-btn:hover { text-decoration: underline; }
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 2px solid #334155;
            background: #1e293b;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--orange); outline: none; }
        label {
            display: block;
            text-align: left;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 5px;
        }
        .token-container {
            position: relative;
            margin-bottom: 20px;
        }
        .copy-btn {
            position: absolute;
            right: 8px;
            top: 26px;
            background: var(--orange);
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 12px;
            color: white;
            transition: transform 0.1s;
        }
        .btn:disabled { background-color: #475569; cursor: not-allowed; opacity: 0.5; }
        .btn-in { background-color: var(--green); }
        .btn-out { background-color: var(--red); }
        .status-msg { margin-top: 15px; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🏀 BasketCount</h1>
        
        <div class="event-details">
            <h2 id="eventDisplay">Loading event...</h2>
            <p id="eventTime" class="detail-item"></p>
            <p id="eventLocation" class="detail-item"></p>
            <a id="eventMaps" class="maps-btn" href="#" target="_blank" style="display:none;">📍 Open in Google Maps</a>
        </div>

        <div id="actionArea">
            <label for="playerName">Your Name:</label>
            <input type="text" id="playerName" placeholder="Enter your full name">
            
            <div class="token-container">
                <label for="deviceTokenInput">📋 Your Notification Token (Copy for Admin):</label>
                <input type="text" id="deviceTokenInput" placeholder="Generating token..." readonly style="color: #cbd5e1; font-size: 11px; padding-right: 75px;">
                <button type="button" class="copy-btn" onclick="copyTokenToClipboard()">COPY</button>
            </div>

            <button id="btnIn" class="btn btn-in" onclick="sendRSVP('Going')">I'M IN</button>
            <button id="btnOut" class="btn btn-out" onclick="sendRSVP('OUT')">CANT MAKE IT</button>
        </div>

        <div id="statusMessage" class="status-msg"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js"></script>
    
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCYY1wMsyEkwXFlbIx0jzfRA5ayDTnTqqY",
          authDomain: "basketcount-kozgaz.firebaseapp.com",
          projectId: "basketcount-kozgaz",
          storageBucket: "basketcount-kozgaz.firebasestorage.app",
          messagingSenderId: "464249124868",
          appId: "1:464249124868:web:79b46b23180d1efc479d51"
        };

        firebase.initializeApp(firebaseConfig);
        const messaging = firebase.messaging();
        
        let deviceTokenVariable = ""; 

        async function requestNotificationPermission() {
            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    console.log('Notification permission granted.');
                    
                    const registration = await navigator.serviceWorker.register('/basketcount/firebase-messaging-sw.js', { 
                        scope: '/basketcount/' 
                    });

                    await navigator.serviceWorker.ready;
                    
                    const currentToken = await messaging.getToken({
                        serviceWorkerRegistration: registration,
                        vapidKey: 'BPXDp_PvudyJI5UkYHPNqSztU-5t7l_MDICa2AZt9VDsI5NcXZuLRKGBFGK3_Bc2jE-rPoNyLtthbg5JHr3fgVY'
                    });
                    
                    if (currentToken) {
                        deviceTokenVariable = currentToken;
                        console.log("FCM TOKEN LOGGED OUT:", deviceTokenVariable);
                        document.getElementById('deviceTokenInput').value = deviceTokenVariable;
                        await registerDeviceToken(deviceTokenVariable);
                    } else {
                        document.getElementById('deviceTokenInput').value = "No token returned from server.";
                    }
                } else {
                    document.getElementById('deviceTokenInput').value = "Notifications Denied in Browser Settings";
                }
            } catch (err) {
                console.error('Notification Setup Error: ', err);
                document.getElementById('deviceTokenInput').value = "Brave/Safari engine block detected.";
            }
        }

        async function registerDeviceToken(token) {
            if (!token) return;
            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        key: SECURITY_KEY,
                        action: 'registerToken',
                        token: token
                    })
                });
            } catch (error) {
                console.error('Token registration failed:', error);
            }
        }

        function copyTokenToClipboard() {
            const tokenField = document.getElementById('deviceTokenInput');
            if (!tokenField.value || tokenField.value.startsWith("Generating") || tokenField.value.includes(" ")) {
                alert("No valid token to copy yet.");
                return;
            }
            navigator.clipboard.writeText(tokenField.value);
            alert("Token copied! Send this text to your group admin via Messenger/WhatsApp.");
        }

        window.addEventListener('load', () => {
            requestNotificationPermission();
        });

        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxlIBYMrfmnuTptRrIEcTvfQ-3chF7vAmdKW4JzuHUQnHmb4sW8SyQBrkTXL8t1c-SKRg/exec"; 
        const SECURITY_KEY = "talicskauborka"; 
        let currentEventTitle = ""; 

        async function fetchActiveEvent() {
            try {
                const response = await fetch(WEB_APP_URL);
                const eventData = await response.json();
                
                currentEventTitle = eventData.title;
                document.getElementById('eventDisplay').innerText = eventData.title;
                
                if (eventData.title === "No Active Invites") {
                    document.getElementById('actionArea').style.display = "none";
                    return;
                }
                
                if (eventData.time) {
                    document.getElementById('eventTime').innerText = "⏰ " + eventData.time;
                    document.getElementById('eventLocation').innerText = "🏢 " + eventData.location;
                    
                    const mapsLink = document.getElementById('eventMaps');
                    mapsLink.href = eventData.mapsLink;
                    mapsLink.style.display = "inline-block";
                }
            } catch (error) {
                document.getElementById('eventDisplay').innerText = "System offline. Try again later.";
                console.error(error);
            }
        }

        async function sendRSVP(rsvpStatus) {
            const nameInput = document.getElementById('playerName').value.trim();
            const statusDiv = document.getElementById('statusMessage');

            if (!nameInput) {
                statusDiv.style.color = "var(--red)";
                statusDiv.innerText = "⚠️ Please enter your name.";
                return;
            }

            statusDiv.style.color = "var(--orange)";
            statusDiv.innerText = "Sending RSVP...";

            const payload = {
                key: SECURITY_KEY,
                action: 'rsvp',
                event: currentEventTitle,
                name: nameInput,
                status: rsvpStatus,
                token: deviceTokenVariable
            };

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    body: JSON.stringify(payload)
                });

                statusDiv.style.color = "var(--green)";
                statusDiv.innerText = `✅ Success! Marked as: ${rsvpStatus}`;
                localStorage.setItem('savedPlayerName', nameInput);
            } catch (error) {
                statusDiv.style.color = "var(--red)";
                statusDiv.innerText = "❌ Connection failed. Try again.";
            }
        }

        window.onload = () => {
            fetchActiveEvent();
            const savedName = localStorage.getItem('savedPlayerName');
            if (savedName) document.getElementById('playerName').value = savedName;
        };
    </script>
</body>
</html>
